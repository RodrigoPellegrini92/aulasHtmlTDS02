<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas em HTML</title>
</head>
<body>
    <table border="1">
        <caption>
            Lista de Pessoas
        </caption>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th>Cidade</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Rodrigo</td>
                <td>33</td>
                <td>São Paulo</td>
            </tr>

            <tr>
                <td>Bob</td>
                <td>2</td>
                <td>São Paulo</td>
            </tr>
        </tbody>
        
        <tfoot>
            <tr>
                <td colspan="3">Total de pessoas: 2</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
